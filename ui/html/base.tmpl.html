{{define "base"}}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}Checkpoint Core{{end}}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  {{block "head" .}}{{end}}
</head>

<body>
  <header class="site-header">
    <div class="shell">
      <h1 class="site-title">Checkpoint Core<span class="site-byline">by George Kontogiannis</span></h1>
      <p class="site-subtitle">A space for the programming stuff I spend my free time on.</p>
      {{template "nav" .}}
    </div>
  </header>

  <main class="site-main">
    {{block "main" .}}{{end}}
  </main>

  <footer class="site-footer" id="contact">
    <div class="shell footer-contact footer-content">
      <!-- <p class="footer-copyright">&copy; 2026 George Kontogiannis</p> -->
    </div>
  </footer>

  <script src="/static/js/main.js" defer></script>
</body>

</html>
{{end}}
