{{define "title"}}Checkpoint Core | Giorgos Kontogiannis{{end}}

{{define "head"}}
<meta
  name="description"
  content="Portfolio of Giorgos Kontogiannis featuring tutorials, applications, reviews, and programming projects across multiple languages."
>
{{end}}

{{define "main"}}
<section class="section shell" id="projects">
  <div class="projects-grid">
    {{range .Projects}}
    <a class="project-link" href="{{.ProjectHref}}">
      <article class="project-rectangle">
        <img
          class="project-image"
          src="{{.ImagePath}}"
          alt="{{.ImageAlt}}"
        >
        <div class="project-content">
          <h3>{{.Title}}</h3>
          <p class="project-summary-card">{{.Summary}}</p>
          <div class="project-tags" aria-label="Project technologies">
            {{range .Tags}}
            <span class="project-tag">{{.}}</span>
            {{end}}
          </div>
        </div>
      </article>
    </a>
    {{end}}
  </div>
</section>
{{end}}
