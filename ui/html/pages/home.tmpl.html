{{define "title"}}Giorgos Kontogiannis | Programming Portfolio{{end}}

{{define "head"}}
<meta
  name="description"
  content="Portfolio of Giorgos Kontogiannis featuring tutorials, applications, reviews, and programming projects across multiple languages."
>
{{end}}

{{define "main"}}
<section class="section shell" id="projects">
  <div class="section-heading">
    <p class="eyebrow">// projects</p>
    <h2>Things I have built, explored, or written up.</h2>
  </div>

  <div class="projects-grid">
    {{range .Projects}}
    <a class="project-link" href="/project/view/{{.ProjectID}}">
      <article class="project-rectangle">
        <img
          class="project-image"
          src="{{.ImagePath}}"
          alt="{{.ImageAlt}}"
        >
        <div class="project-content">
          <p class="project-label">{{.Label}}</p>
          <h3>{{.ProjectTitle}}</h3>
          <p>{{.CardSummary}}</p>
          <p class="project-stack">{{.Stack}}</p>
        </div>
      </article>
    </a>
    {{end}}
  </div>
</section>
{{end}}
